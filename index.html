<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>M&R</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet"> 

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:black;
font-family:'Inter',sans-serif;
color:white;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 45%),
radial-gradient(circle at bottom, rgba(255,255,255,0.05), transparent 40%);
pointer-events:none;
z-index:1;
}

.noise{
position:fixed;
inset:0;
opacity:0.04;
background-image:url("https://grainy-gradients.vercel.app/noise.svg");
pointer-events:none;
z-index:2;
}

#intro{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background:black;
z-index:20;
transition:opacity 2s ease;
padding:30px;
text-align:center;
}

.intro-title{
font-size:clamp(34px,8vw,58px);
font-weight:700;
letter-spacing:-2px;
margin-bottom:16px;
animation:fadeUp 1.8s ease;
}

.intro-text{
font-size:clamp(15px,4vw,19px);
opacity:0.75;
max-width:500px;
line-height:1.7;
animation:fadeUp 2.4s ease;
}

.tap{
margin-top:40px;
font-size:13px;
letter-spacing:3px;
opacity:0.5;
animation:pulse 2s infinite;
}

.gallery{
position:relative;
width:100%;
height:100%;
overflow:hidden;
}

.slide{
position:absolute;
inset:0;
opacity:0;
transition:
opacity 2.5s ease,
transform 8s ease;
transform:scale(1);
}

.slide.active{
opacity:1;
transform:scale(1.06);
z-index:5;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
inset:0;
background:
linear-gradient(to top, rgba(0,0,0,0.75), transparent 35%),
linear-gradient(to bottom, rgba(0,0,0,0.55), transparent 25%);
z-index:6;
}

.bottom-text{
position:fixed;
bottom:32px;
left:50%;
transform:translateX(-50%);
z-index:10;
font-size:13px;
letter-spacing:4px;
opacity:0.75;
font-weight:500;
backdrop-filter:blur(10px);
padding:10px 18px;
border:1px solid rgba(255,255,255,0.08);
border-radius:999px;
background:rgba(255,255,255,0.04);
}

.counter{
position:fixed;
top:24px;
right:24px;
z-index:10;
font-size:13px;
opacity:0.55;
letter-spacing:2px;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes pulse{
0%{
opacity:0.3;
}
50%{
opacity:0.7;
}
100%{
opacity:0.3;
}
}

@media (max-width:768px){

.slide img{
object-position:center;
}

.bottom-text{
bottom:24px;
font-size:11px;
padding:9px 16px;
}

.counter{
top:20px;
right:20px;
font-size:11px;
}
}
</style>
</head>

<body>

<div class="noise"></div>

<div id="intro">
<div class="intro-title">M&R</div>

<div class="intro-text">
Bugün bizim 3. ayımız 🤍<br><br>
İyi ki varsın yaşama sebebim, sevgilim, hayatımın tam olarak anlamı kadın...
</div>

<div class="tap">
TOUCH TO START
</div>
</div>

<div class="gallery">

<div class="slide active">
<img src="IMG-20260423-WA0093.jpg">
</div>

<div class="slide">
<img src="IMG-20260520-WA0140.jpg">
</div>

<div class="slide">
<img src="IMG-20260520-WA0141.jpg">
</div>

<div class="slide">
<img src="IMG-20260520-WA0142.jpg">
</div>

<div class="slide">
<img src="IMG-20260524-WA0164.jpg">
</div>

<div class="slide">
<img src="IMG-20260525-WA0084.jpg">
</div>

<div class="slide">
<img src="IMG-20260604-WA0078.jpg">
</div>

<div class="slide">
<img src="IMG_20260614_200357.jpg">
</div>

<div class="slide">
<img src="Screenshot_2026-06-15-13-29-02-345_com.openai.chatgpt-edit.jpg">
</div>

<div class="slide">
<img src="Snapchat-175866260.jpg">
</div>

<div class="slide">
<img src="Snapchat-2030085650.jpg">
</div>

<div class="slide">
<img src="Snapchat-361328361.jpg">
</div>

<div class="overlay"></div>

</div>

<div class="counter">
03 MONTHS
</div>

<div class="bottom-text">
M&R • FOREVER
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const intro = document.getElementById("intro");
const music = document.getElementById("music");

intro.addEventListener("click", () => {

music.play();

intro.style.opacity = "0";

setTimeout(() => {
intro.style.display = "none";
}, 2000);

});

const slides = document.querySelectorAll(".slide");

let current = 0;

setInterval(() => {

slides[current].classList.remove("active");

current = (current + 1) % slides.length;

slides[current].classList.add("active");

}, 5000);
</script>

</body>
</html>
